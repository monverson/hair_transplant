spring.application.name=hairtrack-backend-transformation
server.port=8080

# JPA / Hibernate (her ortamda ayn?)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Claude API endpoint (her ortamda ayn?)
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-5
claude.api.version=2023-06-01

# JWT expiration (her ortamda ayn?)
jwt.expiration-ms=2592000000

# Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# Aktif profile (default: dev)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}