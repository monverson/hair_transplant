spring.application.name=hairtrack-backend-transformation
server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/hairtrack
spring.datasource.username=hairtrack_user
spring.datasource.password=dev_password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Claude API
claude.api.key=${CLAUDE_API_KEY:sk-ant-a}
claude.api.url=https://api.anthropic.com/v1/messages
claude.api.model=claude-sonnet-4-5
claude.api.version=2023-06-01
claude.mock.enabled=true

