services:
  postgres:
    image: postgres:16-alpine
    container_name: hairtrack-postgres
    environment:
      POSTGRES_DB: hairtrack
      POSTGRES_USER: hairtrack_user
      POSTGRES_PASSWORD: dev_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: